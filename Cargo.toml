[workspace]
resolver = "2"
members = [
    "crates/ferrite-core",
    "crates/ferrite-net",
    "crates/client",
    "crates/cli",
    # Tooling
    "crates/mc-launcher-cli",
]
default-members = ["crates/client"]

[workspace.package]
publish = false
edition = "2024"

[workspace.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "gzip"] }
